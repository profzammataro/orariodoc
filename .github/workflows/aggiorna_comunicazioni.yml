name: Aggiorna Comunicazioni Scolastiche

on:
  schedule:
    # Ogni 30 min dalle 6:00 alle 15:00 (ora italiana, CEST UTC+2)
    - cron: '0,30 4-12 * * *'   # 4:00–12:30 UTC = 6:00–14:30 CEST
    - cron: '0 13 * * *'         # 13:00 UTC = 15:00 CEST (ultimo slot mattina)

    # Ogni ora dalle 16:00 alle 22:00 CEST
    - cron: '0 14-20 * * *'      # 14:00–20:00 UTC = 16:00–22:00 CEST

  workflow_dispatch:

jobs:
  scraper:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Installa Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installa dipendenze
        run: pip install requests beautifulsoup4

      - name: Esegui scraper 
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: python scraper.py
