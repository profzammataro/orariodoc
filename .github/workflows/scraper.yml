name: Aggiorna Comunicazioni Scolastiche

on:
  schedule:
    - cron: '0 5 * * 1-5'  # ogni lunedì-venerdì alle 7:00 ora italiana (UTC+2)
  workflow_dispatch:         # permette di avviarlo manualmente dalla dashboard GitHub

jobs:
  scraper:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Installa Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installa dipendenze
        run: pip install requests beautifulsoup4

      - name: Esegui scraper
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        run: python scraper.py
